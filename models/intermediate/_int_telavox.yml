version: 2

models:
  - name: int_date_spine
    description: One row per calendar date
    columns:
      - name: date_day
        description: calendar date.
        data_tests:
          - unique 
          - not_null


  - name: int_company_dates
    description: One row per company calendar date
    columns:
      - name: company_id
        description: One row per company event in the calendar
      - name: date_day
        description: One row per date

  - name: int_daily_platform_usage
    description: One row per company event on each date
    columns:
      - name: event_date
        description: the date each event takes place on. 
        data_tests:
          - not_null

      - name: company_id
        description: primary key for company id that is responsible for each event.
        data_tests:
          - not_null
        
